<svg xmlns="http://www.w3.org/2000/svg" width="360" height="200" viewBox="0 0 360 200">
  <!-- 배경 -->
  <rect width="360" height="200" rx="14" fill="#fafafa" stroke="#e5e7eb" stroke-width="1.5"/>

  <!-- 상단 레이블 -->
  <rect x="14" y="14" width="68" height="22" rx="5" fill="#fee2e2"/>
  <text x="48" y="29" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#dc2626" text-anchor="middle">적용 전</text>

  <!-- 명령어당 평균 토큰 -->
  <text x="14" y="64" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#9ca3af">명령어당 평균 토큰</text>
  <text x="14" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="800" fill="#dc2626">48,200</text>
  <text x="178" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#9ca3af"> tok</text>

  <!-- 구분선 -->
  <line x1="14" y1="106" x2="346" y2="106" stroke="#e5e7eb" stroke-width="1"/>

  <!-- 카테고리 바 -->
  <text x="14" y="126" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#9ca3af">카테고리별 분포</text>

  <!-- 코드 생성 72% -->
  <text x="14" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#374151">코드 생성</text>
  <rect x="14" y="153" width="332" height="7" rx="3.5" fill="#f3f4f6"/>
  <rect x="14" y="153" width="239" height="7" rx="3.5" fill="#ef4444"/>
  <text x="346" y="161" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#ef4444" text-anchor="end">72%</text>

  <!-- 기타 20% -->
  <text x="14" y="178" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#374151">기타</text>
  <rect x="14" y="183" width="332" height="7" rx="3.5" fill="#f3f4f6"/>
  <rect x="14" y="183" width="66" height="7" rx="3.5" fill="#f87171"/>
  <text x="346" y="191" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#f87171" text-anchor="end">20%</text>
