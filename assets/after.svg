<svg xmlns="http://www.w3.org/2000/svg" width="360" height="200" viewBox="0 0 360 200">
  <!-- 배경 -->
  <rect width="360" height="200" rx="14" fill="#fafafa" stroke="#e5e7eb" stroke-width="1.5"/>

  <!-- 상단 레이블 -->
  <rect x="14" y="14" width="68" height="22" rx="5" fill="#dcfce7"/>
  <text x="48" y="29" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#16a34a" text-anchor="middle">적용 후</text>

  <!-- 명령어당 평균 토큰 -->
  <text x="14" y="64" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#9ca3af">명령어당 평균 토큰</text>
  <text x="14" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="800" fill="#16a34a">7,400</text>
  <text x="120" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#9ca3af"> tok</text>
  <text x="346" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#16a34a" text-anchor="end">▼ 85% 절감</text>

  <!-- 구분선 -->
  <line x1="14" y1="106" x2="346" y2="106" stroke="#e5e7eb" stroke-width="1"/>

  <!-- 카테고리 바 -->
  <text x="14" y="126" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#9ca3af">카테고리별 분포</text>

  <!-- 코드 생성 38% -->
  <text x="14" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#374151">코드 생성</text>
  <rect x="14" y="153" width="332" height="7" rx="3.5" fill="#f3f4f6"/>
  <rect x="14" y="153" width="126" height="7" rx="3.5" fill="#22c55e"/>
  <text x="346" y="161" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#16a34a" text-anchor="end">38%</text>

  <!-- 설명/질문 35% -->
  <text x="14" y="178" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#374151">설명/질문</text>
  <rect x="14" y="183" width="332" height="7" rx="3.5" fill="#f3f4f6"/>
  <rect x="14" y="183" width="116" height="7" rx="3.5" fill="#4ade80"/>
  <text x="346" y="191" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#16a34a" text-anchor="end">35%</text>
</svg>
